services:
  seatgrid-api:
    image: seatgrid-api
    container_name: seatgrid-api
    build:
      context: .
      dockerfile: src/SeatGrid.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=seatgrid;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Booking__Strategy=pessimistic
      - RabbitMQ__Host=rabbitmq
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  payment-service:
    image: seatgrid-payment-service
    container_name: seatgrid-payment-service
    build:
      context: .
      dockerfile: src/SeatGrid.PaymentService/Dockerfile
    environment:
      - RabbitMQ__Host=rabbitmq
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped
